<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fake News Detector</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:linear-gradient(135deg,#141E30,#243B55);

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:30px;

}

.container-box{

width:100%;

max-width:900px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(18px);

border-radius:25px;

padding:40px;

box-shadow:0 20px 50px rgba(0,0,0,.4);

border:1px solid rgba(255,255,255,.2);

color:white;

animation:fade 1s ease;

}

@keyframes fade{

from{

opacity:0;

transform:translateY(30px);

}

to{

opacity:1;

transform:translateY(0);

}

}

h1{

text-align:center;

font-weight:700;

margin-bottom:10px;

}

p.subtitle{

text-align:center;

color:#d8d8d8;

margin-bottom:30px;

}

textarea{

height:260px !important;

border-radius:15px !important;

padding:20px !important;

font-size:16px;

}

button{

width:100%;

padding:15px;

font-size:20px;

font-weight:bold;

border-radius:15px !important;

transition:.3s;

}

button:hover{

transform:scale(1.02);

}

.result{

margin-top:30px;

padding:25px;

border-radius:20px;

text-align:center;

animation:fade .8s;

}

.fake{

background:#ff4d4d;

color:white;

}

.real{

background:#2ecc71;

color:white;

}

.progress{

height:18px;

border-radius:20px;

margin-top:15px;

}

footer{

margin-top:30px;

text-align:center;

font-size:14px;

color:#ddd;

}

</style>

</head>

<body>

<div class="container-box">

<h1>🤖 Fake News Detector</h1>

<p class="subtitle">

Machine Learning • Flask • Logistic Regression • TF-IDF

</p>

<form action="/predict" method="POST">

<div class="mb-4">

<textarea

class="form-control"

name="news"

placeholder="Paste the complete news article here..."

required></textarea>

</div>

<button class="btn btn-primary">

🔍 Analyze News

</button>

</form>

{% if prediction %}

<div class="result {% if prediction=='Fake News' %}fake{% else %}real{% endif %}">

<h2>{{ prediction }}</h2>

<h4 class="mt-3">

Confidence: {{ confidence }}%

</h4>

<div class="progress">

<div

class="progress-bar"

role="progressbar"

style="width: {{ confidence }}%;"

aria-valuenow="{{ confidence }}"

aria-valuemin="0"

aria-valuemax="100">

{{ confidence }}%

</div>

</div>

</div>

{% endif %}

<footer>

Developed by <strong>Utkarsh Singh</strong>

</footer>

</div>

</body>

</html>
