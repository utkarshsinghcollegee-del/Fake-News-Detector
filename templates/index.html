<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake News Detector</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:white;
            width:600px;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 15px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            color:#333;
        }

        textarea{
            width:100%;
            height:220px;
            padding:10px;
            font-size:16px;
        }

        button{
            margin-top:15px;
            width:100%;
            padding:12px;
            font-size:18px;
            cursor:pointer;
        }

        .result{
            margin-top:20px;
            text-align:center;
            font-size:22px;
            font-weight:bold;
        }
    </style>

</head>

<body>

<div class="container">

<h1>Fake News Detector</h1>

<form action="/predict" method="POST">

<textarea
name="news"
placeholder="Paste your news article here..."
required></textarea>

<button type="submit">
Detect News
</button>

</form>

{% if prediction %}

<div class="result">

Prediction:
{{ prediction }}

<br><br>

Confidence:
{{ confidence }}%

</div>

{% endif %}

</div>

</body>
</html>
